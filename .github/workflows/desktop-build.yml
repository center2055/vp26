name: Build Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows App + NSIS
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows installer and app
        working-directory: frontend
        run: npm run tauri:build:nsis

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: vp26-windows-app
          if-no-files-found: error
          path: |
            frontend/src-tauri/target/release/app.exe
            frontend/src-tauri/target/release/vp26-backend.exe

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vp26-windows-installer
          if-no-files-found: error
          path: frontend/src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    name: Linux App + DEB
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            python3-venv

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Linux deb and app
        working-directory: frontend
        run: npm run tauri:build:deb

      - name: Upload Linux app artifact
        uses: actions/upload-artifact@v4
        with:
          name: vp26-linux-app
          if-no-files-found: error
          path: |
            frontend/src-tauri/target/release/app
            frontend/src-tauri/target/release/vp26-backend

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: vp26-linux-deb
          if-no-files-found: error
          path: frontend/src-tauri/target/release/bundle/deb/*.deb

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
